<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🚌 안전한 이동 보드게임</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic',sans-serif;background:linear-gradient(135deg,#e3f2fd 0%,#bbdefb 100%);min-height:100vh;overflow-x:hidden}
.screen{display:none;width:100%;min-height:100vh}
.screen.active{display:flex;flex-direction:column;align-items:center}

/* SETUP */
#setup{justify-content:center;gap:18px;padding:20px}
#setup h1{font-size:46px;text-align:center;text-shadow:2px 2px 4px rgba(0,0,0,.12)}
#setup .sub{font-size:20px;color:#555}
.player-count{display:flex;gap:12px;justify-content:center}
.player-count button{width:58px;height:58px;font-size:26px;border-radius:50%;border:3px solid #1976d2;background:#fff;cursor:pointer;font-weight:700;transition:.2s}
.player-count button.sel{background:#1976d2;color:#fff;transform:scale(1.15)}
.name-inputs{display:flex;flex-direction:column;gap:10px;width:100%;max-width:400px}
.name-row{display:flex;align-items:center;gap:10px;font-size:22px}
.name-row input{flex:1;padding:10px 14px;font-size:20px;border:2px solid #90caf9;border-radius:12px;outline:none}
.name-row input:focus{border-color:#1976d2}
.turn-select{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700}
.turn-select select{font-size:20px;padding:8px 14px;border-radius:10px;border:2px solid #90caf9}
.btn{padding:14px 44px;font-size:24px;font-weight:700;border:none;border-radius:16px;cursor:pointer;transition:.15s;box-shadow:0 4px 12px rgba(0,0,0,.12)}
.btn:active{transform:scale(.95)}
.btn-primary{background:#1976d2;color:#fff}
.btn-green{background:#43a047;color:#fff}
.btn-red{background:#e53935;color:#fff}
.btn-orange{background:#ef6c00;color:#fff}
.btn-sm{padding:10px 20px;font-size:18px}

/* GAME */
#game{padding:8px;gap:6px}
#turn-bar{width:100%;max-width:1200px;text-align:center;font-size:28px;font-weight:700;padding:10px 16px;background:#fff;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.1);display:flex;justify-content:center;align-items:center;gap:20px;flex-wrap:wrap}
#turn-info{font-size:18px;color:#1976d2;background:#e3f2fd;padding:6px 14px;border-radius:10px}
#end-game-btn{padding:8px 18px;font-size:16px;font-weight:700;border:none;border-radius:10px;background:#e53935;color:#fff;cursor:pointer}
#main-area{display:flex;gap:10px;width:100%;max-width:1200px;flex:1;min-height:0}
#board-wrap{flex:1;display:flex;align-items:center;justify-content:center}
#board{position:relative;width:100%;aspect-ratio:1.15;max-height:64vh}
.cell{position:absolute;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;border:2.5px solid rgba(0,0,0,.15);transition:.2s;overflow:hidden;gap:1px}
.cell .cnum{font-size:8px;opacity:.5;position:absolute;top:1px;left:3px}
.cell .cemoji{font-size:20px;line-height:1}
.cell .clabel{font-size:8px;opacity:.85;white-space:nowrap}
.cell-yellow{background:#fff9c4;border-color:#f9a825}
.cell-blue{background:#bbdefb;border-color:#1976d2}
.cell-purple{background:#e1bee7;border-color:#8e24aa}
.cell-red{background:#ffcdd2;border-color:#e53935}
.cell-star{background:#fff8e1;border-color:#ffc107}
.cell-skull{background:#cfd8dc;border-color:#546e7a}
.cell-house{background:#c8e6c9;border-color:#388e3c}
.cell-start{background:#e3f2fd;border-color:#1565c0}
.cell-finish{background:#fff176;border-color:#f57f17;animation:glow 2s infinite alternate}
@keyframes glow{from{box-shadow:0 0 4px #ffc107}to{box-shadow:0 0 14px #ff9800}}
.token{position:absolute;transition:all .5s cubic-bezier(.34,1.56,.64,1);z-index:10;filter:drop-shadow(1px 2px 2px rgba(0,0,0,.3));pointer-events:none;line-height:1}
#sidebar{width:200px;display:flex;flex-direction:column;gap:7px;flex-shrink:0}
.p-card{background:#fff;border-radius:12px;padding:8px 12px;box-shadow:0 2px 6px rgba(0,0,0,.08);display:flex;align-items:center;gap:8px;font-size:16px;transition:.2s;border-left:4px solid transparent}
.p-card.current{border-left-color:#1976d2;background:#e3f2fd;transform:scale(1.03)}
.p-animal{font-size:24px}
.p-info{flex:1}
.p-name{font-weight:700}
.p-pos{font-size:12px;color:#777}
.skip-badge{display:inline-block;background:#ff9800;color:#fff;font-size:10px;padding:1px 6px;border-radius:6px;margin-left:4px}
#controls{width:100%;max-width:1200px;background:#fff;border-radius:14px;padding:10px 18px;box-shadow:0 2px 8px rgba(0,0,0,.1);display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center}
#mic-toggle{padding:8px 16px;font-size:17px;border-radius:12px;border:3px solid #999;background:#fff;cursor:pointer;font-weight:700;transition:.2s}
#mic-toggle.on{border-color:#e53935;background:#ffebee;color:#e53935;animation:pulse-border 1.5s infinite}
@keyframes pulse-border{0%,100%{box-shadow:0 0 0 0 rgba(229,57,53,.4)}50%{box-shadow:0 0 0 8px rgba(229,57,53,0)}}
.vol-wrap{display:flex;align-items:center;gap:6px;flex:1;max-width:240px}
#vol-bar-bg{flex:1;height:18px;background:#e0e0e0;border-radius:9px;overflow:hidden}
#vol-bar{height:100%;width:0%;border-radius:9px;transition:width .05s,background .1s;background:#4caf50}
#vol-num{font-size:14px;font-weight:700;min-width:30px;text-align:right}
.thresh-wrap{display:flex;align-items:center;gap:4px;font-size:12px}
#threshold{width:80px}
#thresh-val{font-weight:700;min-width:26px}
#dice-btn{padding:10px 26px;font-size:20px;border:none;border-radius:14px;background:#ff9800;color:#fff;font-weight:700;cursor:pointer;transition:.15s}
#dice-btn:disabled{opacity:.4;cursor:default}
#dice-display{font-size:40px;min-width:50px;text-align:center}
#dice-display.rolling{animation:ds .1s infinite}
@keyframes ds{0%{transform:rotate(0)}50%{transform:rotate(180deg)}100%{transform:rotate(360deg)}}
#mic-hint{font-size:14px;color:#e53935;font-weight:700}

/* OVERLAY */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:auto}
.popup{background:#fff;border-radius:20px;padding:26px;max-width:540px;width:92%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.25);transform:scale(.85);transition:.25s}
.overlay.show .popup{transform:scale(1)}
.popup h2{font-size:24px;margin-bottom:12px;padding:10px;border-radius:12px;color:#fff}
.popup .q-text{font-size:23px;margin:12px 0;line-height:1.5}
.popup .options{display:flex;flex-direction:column;gap:9px;margin:12px 0}
.popup .opt-btn{padding:11px 16px;font-size:20px;border:3px solid #e0e0e0;border-radius:14px;background:#fafafa;text-align:left;transition:.15s;cursor:pointer;width:100%;font-family:inherit;font-weight:500}
.popup .opt-btn:hover:not(:disabled){background:#e3f2fd;border-color:#1976d2}
.popup .opt-btn:disabled{cursor:default;opacity:.85}
.popup .opt-btn.correct{border-color:#43a047;background:#c8e6c9;font-weight:700}
.popup .opt-btn.wrong{border-color:#e53935;background:#ffebee}
.popup .teacher-btns{display:flex;gap:12px;justify-content:center;margin-top:12px}
.popup .teacher-btns .btn{font-size:20px;min-width:100px;padding:12px 22px}
.popup .result-msg{font-size:22px;font-weight:700;margin:10px 0}
.event-emoji{font-size:56px;margin:6px 0}
.event-text{font-size:22px;font-weight:700;margin:8px 0;line-height:1.4}
.h-yellow{background:#f9a825}.h-blue{background:#1976d2}.h-purple{background:#8e24aa}.h-red{background:#e53935}

/* END */
#end{justify-content:center;gap:20px;padding:20px}
#end h1{font-size:40px}
.rank-table{background:#fff;border-radius:16px;padding:20px 24px;box-shadow:0 4px 16px rgba(0,0,0,.1);min-width:340px}
.rank-row{display:flex;align-items:center;gap:12px;padding:12px 4px;font-size:22px;border-bottom:1px solid #eee}
.rank-row:last-child{border:none}
.rank-num{font-size:26px;font-weight:700;min-width:36px}

#fireworks{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200}
.fw-particle{position:absolute;border-radius:50%;animation:fw-fall 1.5s ease-out forwards}
@keyframes fw-fall{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}
.flash-effect{animation:fa .15s}
@keyframes fa{0%{filter:brightness(1)}50%{filter:brightness(1.6)}100%{filter:brightness(1)}}
</style>
</head><body>

<!-- SETUP -->
<div id="setup" class="screen active">
<h1>🚌 안전한 이동 보드게임</h1>
<div class="sub">경산 자인학교 · 진로와 직업 7단원 복습</div>
<div style="font-size:20px;font-weight:700;margin-top:6px">플레이어 수를 선택하세요</div>
<div class="player-count" id="pcnt"></div>
<div class="name-inputs" id="names"></div>
<div class="turn-select" id="turn-sel" style="display:none">

<option value="3">3턴</option><option value="4">4턴</option>
<option value="5" selected>5턴</option><option value="6">6턴</option>
<option value="7">7턴</option><option value="8">8턴</option>
<option value="10">10턴</option>
</select>
<span style="font-size:14px;color:#777;font-weight:400">(전원 1번씩 = 1턴)</span>
</div>
<button class="btn btn-primary" id="start-btn" style="display:none" onclick="startGame()">🎮 게임 시작!</button>
</div>

<!-- GAME -->
<div id="intro" class="screen">
<div style="background:#fff;border-radius:20px;padding:36px 40px;box-shadow:0 8px 32px rgba(0,0,0,.15);text-align:center;max-width:500px;width:92%">
<div style="font-size:40px;margin-bottom:8px">🎤 선수 입장!</div>
<div id="intro-list" style="margin:20px 0"></div>
<div style="font-size:18px;color:#555;margin:16px 0" id="intro-turns"></div>
<div style="font-size:26px;font-weight:700;margin:20px 0">준비되었나요? 🔥</div>
<button class="btn btn-primary" onclick="realStart()" style="font-size:28px;padding:16px 52px">🚀 게임 시작!</button>
</div>
</div>

<div id="game" class="screen">
<div id="turn-bar">
<span id="turn-text"></span>
<span id="turn-info"></span>
<button id="end-game-btn" onclick="confirmEnd()">⏹ 게임 끝내기</button>
</div>
<div id="main-area">
<div id="board-wrap"><div id="board"></div></div>
<div id="sidebar"></div>
</div>
<div id="controls">
<button id="mic-toggle" onclick="toggleMic()">🎤 마이크 OFF</button>
<div class="vol-wrap"><div id="vol-bar-bg"><div id="vol-bar"></div></div><span id="vol-num">0</span></div>
<div class="thresh-wrap">
<span>←예민</span>
<input type="range" id="threshold" min="50" max="220" value="160" oninput="document.getElementById('thresh-val').textContent=this.value">
<span>둔감→</span><span id="thresh-val">160</span>
</div>
<button id="dice-btn" onclick="rollDice()">🎲 주사위 굴리기</button>
<div id="dice-display">🎲</div>
<div id="mic-hint"></div>
</div>
</div>

<div class="overlay" id="quiz-overlay"><div class="popup" id="quiz-popup"></div></div>
<div class="overlay" id="event-overlay"><div class="popup" id="event-popup"></div></div>
<div class="overlay" id="confirm-overlay"><div class="popup" id="confirm-popup"></div></div>

<!-- END -->
<div id="end" class="screen">
<h1>🏆 게임 종료!</h1>
<div class="rank-table" id="rank-table"></div>
<button class="btn btn-primary" onclick="location.reload()">🔄 다시 하기</button>
</div>
<div id="fireworks"></div>

{q:'교통카드를 집에 두고 왔어요.',o:['그냥 탄다','현금을 내거나 선생님/부모님께 연락한다','울고만 있는다','도망친다'],a:1},
{q:'지하철에서 모르는 사람이 말을 걸어요.',o:['함께 간다','대답하지 않고 역무원/어른께 알린다','소리 지른다','숨는다'],a:1},
{q:'핸드폰 배터리가 다 됐는데 길을 모를 때는?',o:['그 자리에서 기다린다','역무원이나 주변 어른께 도움 요청','운다','집으로 걸어간다'],a:1},
{q:'버스 안에서 지갑을 잃어버렸어요.',o:['모른 척한다','기사님께 알리거나 분실물 센터에 신고','다른 사람 지갑을 가져간다','내린다'],a:1},
{q:'내려야 할 정류장을 지나쳤어요.',o:['계속 탄다','다음 정류장에서 내린다','창문으로 나간다','소리 지른다'],a:1},
{q:'낯선 사람이 같이 가자고 해요.',o:['따라간다','거절하고 안전한 곳으로 이동한다','이름을 알려준다','손을 잡고 간다'],a:1},
{q:'이동 중 몸이 아플 때는?',o:['참고 계속 간다','가까운 역무원/기사님께 알린다','혼자 해결한다','모른 척한다'],a:1},
{q:'길을 모를 때 스마트폰으로 할 수 있는 것은?',o:['게임하기','지도앱으로 경로 검색하기','사진 찍기','음악 듣기'],a:1}
]};

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]]}return a}
const qPool={},qIdx={};
function initPools(){for(const k of Object.keys(QS)){qPool[k]=[...QS[k]];shuffle(qPool[k]);qIdx[k]=0}}
function getQ(cat){if(qIdx[cat]>=qPool[cat].length){shuffle(qPool[cat]);qIdx[cat]=0}return qPool[cat][qIdx[cat]++]}

// State
let players=[],curP=0,phase='setup',cooldown=false,micOn=false,micStream=null,analyser=null;
let pendingCb=null;
let maxTurns=5,curTurn=1,turnPlayerIdx=0; // turnPlayerIdx: how many players rolled this turn

// Setup
const pcntDiv=document.getElementById('pcnt');
let pCount=0;
for(let n=2;n<=5;n++){
const b=document.createElement('button');b.textContent=n;
b.onclick=()=>{
document.querySelectorAll('.player-count button').forEach(x=>x.classList.remove('sel'));
b.classList.add('sel');pCount=n;
const nd=document.getElementById('names');nd.innerHTML='';
for(let i=0;i<n;i++) nd.innerHTML+=`<div class="name-row"><span style="font-size:28px">${ANIMALS[i]}</span><input type="text" placeholder="플레이어 ${i+1} 이름" maxlength="8" id="pn${i}"></div>`;
document.getElementById('turn-sel').style.display='flex';
document.getElementById('start-btn').style.display='block';
};
pcntDiv.appendChild(b);
}

function startGame(){
if(!pCount)return;
players=[];
for(let i=0;i<pCount;i++){
const nm=(document.getElementById('pn'+i).value||'').trim()||`플레이어${i+1}`;
players.push({name:nm,animal:ANIMALS[i],pos:0,skip:false});
}
maxTurns=+document.getElementById('turn-count').value;
curP=0;curTurn=1;turnPlayerIdx=0;phase='intro';
initPools();
document.getElementById('setup').classList.remove('active');
document.getElementById('intro').classList.add('active');
// build intro list with staggered animation
const list=document.getElementById('intro-list');list.innerHTML='';
players.forEach((p,i)=>{
const row=document.createElement('div');
row.style.cssText='font-size:28px;font-weight:700;padding:12px;opacity:0;transform:translateX(-40px);transition:all .5s ease;';
row.textContent=`${p.animal} ${p.name}`;
list.appendChild(row);
setTimeout(()=>{row.style.opacity='1';row.style.transform='translateX(0)';sfxStep()},400+i*500);
});
document.getElementById('intro-turns').textContent=`📋 ${maxTurns}턴 진행 · ${pCount}명 참가`;
}
function realStart(){
phase='playing';
document.getElementById('intro').classList.remove('active');
document.getElementById('game').classList.add('active');
requestAnimationFrame(()=>requestAnimationFrame(()=>{buildBoard();renderUI()}));
}

// Board
function getCellPx(idx){
const board=document.getElementById('board');
const bw=board.offsetWidth,bh=board.offsetHeight;
const cw=bw/9,ch=bh/8;
const p=POS[idx];
return{left:p.x*cw,top:p.y*ch,w:cw*.93,h:ch*.93}
}
function buildBoard(){
const board=document.getElementById('board');board.innerHTML='';
for(let i=0;i<TOTAL;i++){
const d=document.createElement('div');d.className=`cell cell-${CELLS[i].c}`;d.id='c'+i;
const lbl=CELLS[i].l||'';
d.innerHTML=`<span class="cnum">${i}</span><span class="cemoji">${CELLS[i].e}</span>${lbl?`<span class="clabel">${lbl}</span>`:''}`;
board.appendChild(d);
}
for(let i=0;i<players.length;i++){
const t=document.createElement('div');t.className='token';t.id='t'+i;t.textContent=players[i].animal;
board.appendChild(t);
}
layoutBoard();
window.onresize=layoutBoard;
}
function layoutBoard(){
for(let i=0;i<TOTAL;i++){
const el=document.getElementById('c'+i);const p=getCellPx(i);
Object.assign(el.style,{left:p.left+'px',top:p.top+'px',width:p.w+'px',height:p.h+'px'});
const em=el.querySelector('.cemoji');
if(em)em.style.fontSize=Math.max(14,Math.min(p.w,p.h)*.38)+'px';
}
placeTokens();
}
function placeTokens(){
for(let i=0;i<players.length;i++){
const t=document.getElementById('t'+i);if(!t)continue;
const pos=Math.min(players[i].pos,29);
const p=getCellPx(pos);
const off=(i-(players.length-1)/2)*Math.min(10,p.w*.16);
t.style.left=(p.left+p.w/2-10+off)+'px';
t.style.top=(p.top+p.h/2-10)+'px';
t.style.fontSize=Math.max(14,Math.min(p.w,p.h)*.35)+'px';
}
}

function renderUI(){
const cp=players[curP];
document.getElementById('turn-text').innerHTML=cp.skip
?`${cp.animal} ${cp.name} — 🏠 쉬는 턴!`
:`${cp.animal} <b>${cp.name}</b>의 차례! ${micOn?'🎤 소리 질러!':'🎲 주사위!'}`;
document.getElementById('turn-info').textContent=`턴 ${curTurn}/${maxTurns}`;

const sb=document.getElementById('sidebar');sb.innerHTML='';
// sort by pos descending for display
const ranked=[...players].map((p,i)=>({...p,idx:i})).sort((a,b)=>b.pos-a.pos);
players.forEach((p,i)=>{
const rank=ranked.findIndex(r=>r.idx===i)+1;
const card=document.createElement('div');
card.className='p-card'+(i===curP?' current':'');
let ex=p.skip?'<span class="skip-badge">쉬는 턴</span>':'';
card.innerHTML=`<span class="p-animal">${p.animal}</span><div class="p-info"><div class="p-name">${p.name} ${ex}</div><div class="p-pos">${p.pos}칸 · ${rank}위</div></div>`;
sb.appendChild(card);
});
document.getElementById('dice-btn').disabled=phase!=='playing'||cooldown;
document.getElementById('dice-btn').style.display=micOn?'none':'block';
document.getElementById('mic-hint').textContent=micOn&&phase==='playing'&&!cooldown?'🎤 소리 질러!':'';
placeTokens();
}

// Audio
let audioCtx;
function ac(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function tone(f,d,tp='square',v=.12){try{const c=ac(),o=c.createOscillator(),g=c.createGain();o.type=tp;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d)}catch(e){}}
function sfxDice(){tone(300,.05);setTimeout(()=>tone(400,.05),60);setTimeout(()=>tone(500,.05),120)}
function sfxCorrect(){tone(523,.12,'sine',.18);setTimeout(()=>tone(659,.12,'sine',.18),120);setTimeout(()=>tone(784,.2,'sine',.18),240)}
function sfxWrong(){tone(200,.35,'sawtooth',.1)}
function sfxLucky(){for(let i=0;i<5;i++)setTimeout(()=>tone(800+i*120,.08,'sine',.1),i*70)}
function sfxTrap(){tone(400,.12);setTimeout(()=>tone(250,.25),120)}
function sfxWin(){for(let i=0;i<10;i++)setTimeout(()=>tone(400+i*60,.12,'sine',.13),i*90)}
function sfxStep(){tone(600,.04,'sine',.08)}

// Mic
async function toggleMic(){
const btn=document.getElementById('mic-toggle');
if(!micOn){
try{
micStream=await navigator.mediaDevices.getUserMedia({audio:true});
const ctx=ac(),src=ctx.createMediaStreamSource(micStream);
analyser=ctx.createAnalyser();analyser.fftSize=256;src.connect(analyser);
micOn=true;btn.classList.add('on');btn.textContent='🎤 마이크 ON';micLoop();
}catch(e){alert('마이크를 사용할 수 없어요. 버튼으로 진행합니다.')}
}else{
micOn=false;btn.classList.remove('on');btn.textContent='🎤 마이크 OFF';
if(micStream)micStream.getTracks().forEach(t=>t.stop());analyser=null;
document.getElementById('vol-bar').style.width='0%';document.getElementById('vol-num').textContent='0';
}
renderUI();
}
function getVol(){if(!analyser)return 0;const b=new Uint8Array(analyser.frequencyBinCount);analyser.getByteFrequencyData(b);let s=0;for(let i=0;i<b.length;i++)s+=b[i];return s/b.length}
function micLoop(){
if(!micOn)return;
const vol=getVol(),pct=Math.min(vol/220*100,100);
const bar=document.getElementById('vol-bar');
bar.style.width=pct+'%';bar.style.background=pct<40?'#4caf50':pct<70?'#ffc107':'#e53935';
document.getElementById('vol-num').textContent=Math.round(vol);
if(vol>+document.getElementById('threshold').value&&phase==='playing'&&!cooldown)rollDice();
requestAnimationFrame(micLoop);
}

// Dice
function rollDice(){
if(phase!=='playing'||cooldown)return;
const cp=players[curP];
if(cp.skip){cp.skip=false;cooldown=true;showEvent('🏠',`${cp.name} — 쉬는 턴!`,()=>{cooldown=false;nextTurn()});return}
cooldown=true;
const dd=document.getElementById('dice-display');dd.classList.add('rolling');sfxDice();
let cnt=0;
const iv=setInterval(()=>{dd.textContent=['🎲','1️⃣','2️⃣','3️⃣','4️⃣'][0|Math.random()*5];cnt++;
if(cnt>14){clearInterval(iv);const val=1+Math.floor(Math.random()*4);dd.classList.remove('rolling');dd.textContent=['','1️⃣','2️⃣','3️⃣','4️⃣'][val];
document.getElementById('board-wrap').classList.add('flash-effect');setTimeout(()=>document.getElementById('board-wrap').classList.remove('flash-effect'),200);
setTimeout(()=>doMove(val),500)}},70);
}

// Move
function doMove(steps){const p=players[curP];const target=Math.min(p.pos+steps,29);stepAnim(p,target,()=>afterMove())}
function stepAnim(p,target,cb){if(p.pos>=target){placeTokens();cb();return}p.pos++;placeTokens();sfxStep();setTimeout(()=>stepAnim(p,target,cb),220)}
function afterMove(){
const p=players[curP];
// reaching finish: just stay at 29, no special end
handleCell(CELLS[Math.min(p.pos,29)].t);
}
function handleCell(type){
if(type==='yellow')showQuiz('yellow','h-yellow',1);
else if(type==='blue')showQuiz('blue','h-blue',1);
else if(type==='purple')showQuiz('purple','h-purple',1);
else if(type==='red')showQuiz('red','h-red',2);
else if(type==='star'){sfxLucky();showEvent('🌟','럭키! 주사위를 한 번 더!',()=>{cooldown=false;renderUI()})}
else if(type==='skull'){sfxTrap();showEvent('💀','함정! 2칸 뒤로!',()=>{players[curP].pos=Math.max(players[curP].pos-2,0);placeTokens();renderUI();cooldown=false;nextTurn()})}
else if(type==='house'){players[curP].skip=true;showEvent('🏠','쉬어가요! 다음 턴 스킵!',()=>{cooldown=false;nextTurn()})}
else if(type==='finish'){sfxWin();spawnFW();showEvent('🏁',`${players[curP].name} 도착! 🎉`,()=>{cooldown=false;nextTurn()})}
else{cooldown=false;nextTurn()}
}

// Quiz — 확인 버튼으로 넘어가기
function showQuiz(cat,hClass,bonus){
const q=getQ(cat);const idxArr=q.o.map((_,i)=>i);shuffle(idxArr);
const shuffled=idxArr.map(i=>q.o[i]);const correctIdx=idxArr.indexOf(q.a);
const catName={yellow:'🚗 이동수단 퀴즈',blue:'🚌 버스 퀴즈',purple:'🚇 지하철 퀴즈',red:'⚠️ 문제상황 퀴즈'}[cat];
const nums=['①','②','③','④'];
const popup=document.getElementById('quiz-popup');
let optH=shuffled.map((o,i)=>`<button class="opt-btn" id="qo${i}" onclick="pickAnswer(${i},${correctIdx},${bonus})">${nums[i]} ${o}</button>`).join('');
popup.innerHTML=`<h2 class="${hClass}">${catName}</h2><div class="q-text">${q.q}</div><div class="options">${optH}</div>
<div class="result-msg" id="qres"></div>
<button class="btn btn-primary btn-sm" id="quiz-ok-btn" style="display:none" onclick="quizOk()">확인 ▶ 다음</button>`;
show('quiz-overlay');
window._quizBonus=bonus;window._quizCorrect=false;
}
function pickAnswer(picked,ci,bonus){
// disable all buttons
document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
document.getElementById('qo'+ci).classList.add('correct');
const res=document.getElementById('qres');const nums=['①','②','③','④'];
if(picked===ci){
sfxCorrect();res.innerHTML=`🎉 정답이에요! +${bonus}칸 전진!`;res.style.color='#2e7d32';
window._quizCorrect=true;
}else{
document.getElementById('qo'+picked).classList.add('wrong');
sfxWrong();res.innerHTML=`😊 아쉬워요! 정답은 <b>${nums[ci]}번</b>`;res.style.color='#c62828';
window._quizCorrect=false;
}
document.getElementById('quiz-ok-btn').style.display='inline-block';
}
function quizOk(){
const correct=window._quizCorrect,bonus=window._quizBonus;
hide('quiz-overlay');
if(correct){
const p=players[curP];const target=Math.min(p.pos+bonus,29);
stepAnim(p,target,()=>{
if(p.pos>=29){sfxWin();spawnFW();showEvent('🏁',`${p.name} 도착! 🎉`,()=>{cooldown=false;nextTurn()})}
else{cooldown=false;renderUI();nextTurn()}
});
}else{cooldown=false;renderUI();nextTurn()}
}

// Events (with 확인 button)
function showEvent(emoji,text,cb){
pendingCb=cb;
document.getElementById('event-popup').innerHTML=`<div class="event-emoji">${emoji}</div><div class="event-text">${text}</div><button class="btn btn-primary btn-sm" onclick="fireCb()">확인 ▶</button>`;
show('event-overlay');
}
function fireCb(){hide('event-overlay');if(pendingCb){const c=pendingCb;pendingCb=null;c()}}

// Turn logic
function nextTurn(){
if(phase!=='playing')return;
let next=(curP+1)%players.length;
turnPlayerIdx++;
// if all players played this turn, advance turn
if(turnPlayerIdx>=players.length){
turnPlayerIdx=0;curTurn++;
if(curTurn>maxTurns){endGame();return}
}
curP=next;renderUI();
if(players[curP].skip){
setTimeout(()=>{players[curP].skip=false;cooldown=true;
showEvent('🏠',`${players[curP].name} — 쉬는 턴!`,()=>{cooldown=false;nextTurn()})},400);
}
}

// End game
function confirmEnd(){
document.getElementById('confirm-popup').innerHTML=`<div class="event-emoji">⏹</div><div class="event-text">정말 게임을 끝낼까요?<br>현재 위치로 순위를 정합니다.</div>
<div style="display:flex;gap:12px;justify-content:center;margin-top:16px">
<button class="btn btn-red" onclick="hide('confirm-overlay');endGame()">끝내기</button>
<button class="btn btn-primary" onclick="hide('confirm-overlay')">계속하기</button></div>`;
show('confirm-overlay');
}
function endGame(){
phase='ended';sfxWin();spawnFW();
document.getElementById('game').classList.remove('active');
document.getElementById('end').classList.add('active');
const ranked=[...players].map((p,i)=>({...p,idx:i})).sort((a,b)=>b.pos-a.pos);
const medals=['🥇','🥈','🥉','4️⃣','5️⃣'];
const rt=document.getElementById('rank-table');rt.innerHTML='';
ranked.forEach((p,i)=>{
rt.innerHTML+=`<div class="rank-row"><span class="rank-num">${medals[i]||i+1}</span><span style="font-size:28px">${p.animal}</span><b>${p.name}</b><span style="margin-left:auto;color:#555;font-size:18px">${p.pos}칸</span></div>`;
});
}

function spawnFW(){
const fw=document.getElementById('fireworks');
for(let i=0;i<80;i++){
const p=document.createElement('div');p.className='fw-particle';
p.style.left=Math.random()*100+'%';p.style.top=(10+Math.random()*50)+'%';
p.style.background=['#e53935','#ffc107','#43a047','#1976d2','#8e24aa','#ff9800','#e91e63'][0|Math.random()*7];
p.style.setProperty('--dx',(Math.random()*240-120)+'px');p.style.setProperty('--dy',(Math.random()*240-120)+'px');
const sz=4+Math.random()*6;p.style.width=sz+'px';p.style.height=sz+'px';
fw.appendChild(p);
}
setTimeout(()=>fw.innerHTML='',2000);
}

function show(id){document.getElementById(id).classList.add('show')}
function hide(id){document.getElementById(id).classList.remove('show')}
</script>
</body></html>
